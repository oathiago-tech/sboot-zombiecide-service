spring.application.name=sboot-zombiecide-service

spring.datasource.url=jdbc:postgresql://localhost:5432/zombicide
spring.datasource.username=zombicide_app
spring.datasource.password=zombicide_app_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.baseline-on-migrate=true
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.default-schema=zombicide
spring.flyway.schemas=zombicide
spring.jpa.properties.hibernate.default_schema=zombicide


serial.nfc.enabled=true
serial.nfc.charset=UTF-8
serial.nfc.baud-rate=115200
serial.nfc.port=/dev/cu.usbserial-0001